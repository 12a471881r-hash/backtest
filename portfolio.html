<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CryptoEdge — Live Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#0f1117; --card:#171923; --accent:#f7931a; --text:#ffffff; --text2:#b8bfd3; --border:#2b3245; }
        body{ font-family:'Inter', sans-serif; background:var(--bg); color:white; padding:40px; display:flex; justify-content:center; }
        .container{ width:100%; max-width:600px; }
        .search-box{ background:var(--card); padding:20px; border-radius:20px; border:1px solid var(--border); margin-bottom:20px; }
        input{ width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background:#0f1117; color:white; margin-bottom:10px; box-sizing:border-box; }
        button{ width:100%; padding:12px; border-radius:10px; border:none; background:var(--accent); color:white; font-weight:bold; cursor:pointer; }
        .asset-card{ background:var(--card); padding:15px; border-radius:15px; border:1px solid var(--border); margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
        .loading{ text-align:center; color:var(--accent); display:none; }
        .total-header{ font-size:24px; font-weight:800; margin-bottom:20px; text-align:center; color:var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="search-box">
        <h2 style="margin-bottom:15px">🔍 Analizza Wallet</h2>
        <input type="text" id="walletAddr" placeholder="Incolla indirizzo Ethereum (0x...)">
        <button onclick="fetchWalletData()">Scarica Dati Live</button>
    </div>

    <div id="loading" class="loading">Interrogando la blockchain...</div>
    <div id="totalVal" class="total-header"></div>
    <div id="results"></div>
</div>

<script>
    // 1. METTI QUI LA TUA CHIAVE MORALIS
    const MORALIS_KEY = 'INSERISCI_QUI_LA_TUA_CHIAVE'; 

    async function fetchWalletData() {
        const address = document.getElementById('walletAddr').value.trim();
        const resultsDiv = document.getElementById('results');
        const loading = document.getElementById('loading');
        const totalHeader = document.getElementById('totalVal');

        if(!address.startsWith('0x') || address.length < 40) {
            alert("Per favore inserisci un indirizzo Ethereum valido.");
            return;
        }

        // Reset UI
        resultsDiv.innerHTML = '';
        totalHeader.innerText = '';
        loading.style.display = 'block';

        try {
            // Chiamata API a Moralis (Chain: Ethereum)
            const response = await fetch(`https://deep-index.moralis.io/api/v2.2/${address}/erc20?chain=eth`, {
                method: 'GET',
                headers: {
                    'accept': 'application/json',
                    'X-API-Key': MORALIS_KEY
                }
            });

            if (!response.ok) throw new Error("Errore API o Chiave non valida");

            const tokens = await response.json();
            loading.style.display = 'none';

            if (tokens.length === 0) {
                resultsDiv.innerHTML = "<p style='text-align:center'>Nessun token trovato.</p>";
                return;
            }

            let grandTotal = 0;

            tokens.forEach(token => {
                const balance = parseFloat(token.balance_formatted);
                const price = parseFloat(token.usd_price || 0);
                const usdValue = balance * price;
                grandTotal += usdValue;

                // Crea l'elemento grafico per ogni token
                if(balance > 0) {
                    const card = document.createElement('div');
                    card.className = 'asset-card';
                    card.innerHTML = `
                        <div>
                            <strong style="color:var(--accent)">${token.symbol}</strong><br>
                            <small style="color:var(--text2)">${balance.toFixed(4)} ${token.symbol}</small>
                        </div>
                        <div style="text-align:right">
                            <div>$${usdValue.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                            <small style="color:#16c784">$${price.toFixed(2)}</small>
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                }
            });

            totalHeader.innerText = `Valore Totale: $${grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

        } catch (err) {
            loading.style.display = 'none';
            alert("Errore: " + err.message);
            console.error(err);
        }
    }
</script>

</body>
</html>    </style>
</head>
<body>

<div class="page">
    <div class="topbar">
        <div style="display:flex; gap:15px; align-items:center;">
            <div class="logo-box">₿</div>
            <div><h1>CryptoEdge</h1><p style="color:var(--text2)">AI Portfolio Manager</p></div>
        </div>
        <button class="btn btn-primary" onclick="toggleModal()">+ Importa Wallet</button>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Valore Stimato</h3>
            <div class="total-balance" id="totalBalance">€0.00</div>
            <p style="color:var(--text2); margin-top:10px; font-size:14px;">Basato sui prezzi correnti di mercato.</p>
        </div>

        <div class="card">
            <h3>I Tuoi Asset</h3>
            <div class="asset-list" id="assetList">
                </div>
        </div>
    </div>
</div>

<div class="modal" id="walletModal">
    <div class="modal-box">
        <h2>Collega Blockchain</h2>
        <p style="color:var(--text2); font-size:14px; margin-top:5px;">Inserisci il tuo indirizzo Ethereum (ERC20)</p>
        <input type="text" id="walletAddress" placeholder="0x...">
        <button class="btn btn-primary" id="importBtn" onclick="importFromMoralis()" style="width:100%">Analizza Wallet</button>
        <button class="btn" onclick="toggleModal()" style="width:100%; background:transparent; color:white; margin-top:10px;">Annulla</button>
    </div>
</div>

<script>
// --- CONFIGURAZIONE (Sostituisci con i tuoi dati) ---
const SB_URL = 'IL_TUO_URL_SUPABASE';
const SB_KEY = 'LA_TUA_ANON_KEY';
const MORALIS_KEY = 'LA_TUA_MORALIS_API_KEY';

const supabase = supabase.createClient(SB_URL, SB_KEY);

function toggleModal() {
    document.getElementById('walletModal').classList.toggle('active');
}

// Funzione per importare dati live da Moralis
async function importFromMoralis() {
    const address = document.getElementById('walletAddress').value.trim();
    const btn = document.getElementById('importBtn');
    
    if (!address.startsWith('0x')) {
        alert("Inserisci un indirizzo Ethereum valido");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Sincronizzazione...";

    try {
        // Chiamata a Moralis API per token ERC20
        const response = await fetch(`https://deep-index.moralis.io/api/v2.2/${address}/erc20?chain=eth`, {
            headers: { 'X-API-Key': MORALIS_KEY }
        });
        const tokens = await response.json();

        const { data: { user } } = await supabase.auth.getUser();
        if (!user) throw new Error("Devi essere loggato");

        // Prepariamo i dati per il bulk insert
        const assetsToInsert = tokens.map(t => ({
            user_id: user.id,
            symbol: t.symbol,
            amount: parseFloat(t.balance_formatted),
            buy_price: parseFloat(t.usd_price || 0),
            wallet_address: address
        })).filter(t => t.amount > 0); // Importiamo solo token con saldo > 0

        if (assetsToInsert.length > 0) {
            const { error } = await supabase.from('portfolio').insert(assetsToInsert);
            if (error) throw error;
            alert(`Importati ${assetsToInsert.length} asset!`);
        } else {
            alert("Nessun token trovato in questo wallet.");
        }

        toggleModal();
        loadPortfolio();

    } catch (err) {
        console.error(err);
        alert("Errore durante l'importazione: " + err.message);
    } finally {
        btn.disabled = false;
        btn.innerText = "Analizza Wallet";
    }
}

async function loadPortfolio() {
    const listEl = document.getElementById('assetList');
    const totalEl = document.getElementById('totalBalance');
    listEl.innerHTML = '<p>Caricamento...</p>';

    const { data: { user } } = await supabase.auth.getUser();
    if (!user) {
        listEl.innerHTML = '<p>Effettua il login per vedere il portfolio.</p>';
        return;
    }

    const { data, error } = await supabase
        .from('portfolio')
        .select('*')
        .eq('user_id', user.id);

    if (error) return;

    let totalEUR = 0;
    listEl.innerHTML = '';

    data.forEach(item => {
        const value = item.amount * item.buy_price;
        totalEUR += value;

        const div = document.createElement('div');
        div.className = 'asset';
        div.innerHTML = `
            <div class="asset-left">
                <div class="coin-img">${item.symbol[0]}</div>
                <div>
                    <h4 style="margin:0">${item.symbol}</h4>
                    <small style="color:var(--text3)">${item.amount.toFixed(4)} unità</small>
                </div>
            </div>
            <div style="text-align:right">
                <div style="font-weight:bold">€${value.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                <small style="color:var(--green)">Live Price</small>
            </div>
        `;
        listEl.appendChild(div);
    });

    totalEl.innerText = `€${totalEUR.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
}

// Carica all'avvio
window.onload = loadPortfolio;

</script>
</body>
</html>
