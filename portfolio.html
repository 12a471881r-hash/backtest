
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CryptoEdge AI — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
    --bg:#0f1117;
    --bg2:#171923;
    --bg3:#1e2230;
    --bg4:#262c3d;
    --border:#2b3245;
    --border2:#3b435b;
    --text:#ffffff;
    --text2:#b8bfd3;
    --text3:#7f8799;
    --accent:#f7931a;
    --accent2:#ff6b35;
    --green:#16c784;
    --red:#ea3943;
    --radius:18px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#0f1117;
    color:white;
    min-height:100vh;
}

.page{
    max-width:1400px;
    margin:auto;
    padding:28px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:28px;
}

.logo{
    display:flex;
    gap:14px;
    align-items:center;
}

.logo-box{
    width:56px;
    height:56px;
    border-radius:18px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:800;
}

.top-actions{
    display:flex;
    gap:12px;
}

.btn{
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
}

.btn-primary{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
}

.dashboard-btn{
    text-decoration:none;
    padding:12px 18px;
    border-radius:12px;
    background:var(--bg2);
    border:1px solid var(--border);
    color:white;
    font-weight:700;
}

.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:22px;
}

.card{
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:20px;
    padding:24px;
}

.total-balance{
    font-size:42px;
    font-weight:800;
    margin-bottom:20px;
}

.asset-list{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.asset{
    background:var(--bg3);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.asset-left{
    display:flex;
    align-items:center;
    gap:14px;
}

.coin{
    width:52px;
    height:52px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
    color:white;
    background:linear-gradient(135deg,#f7931a,#ffb347);
}

.asset-info p{
    color:#7f8799;
    font-size:13px;
}

.asset-modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    display:none;
    align-items:center;
    justify-content:center;
}

.asset-modal.active{
    display:flex;
}

.asset-box{
    width:520px;
    background:#171923;
    border-radius:20px;
    padding:24px;
}

.crypto-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.crypto-item{
    background:#1e2230;
    padding:18px;
    border-radius:18px;
    cursor:pointer;
    border:1px solid #2b3245;
}

.crypto-item:hover{
    border-color:#f7931a;
}

.close-btn{
    width:42px;
    height:42px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#262c3d;
    color:white;
}

.asset-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}
</style>
</head>
<body>

<div class="page">

<div class="topbar">

<div class="logo">
<div class="logo-box">₿</div>
<div>
<h1>Portfolio</h1>
<p>Gestione avanzata del capitale</p>
</div>
</div>

<div class="top-actions">
<a href="index.html" class="dashboard-btn">← Dashboard</a>

<button class="btn btn-primary" onclick="openAssetMenu()">
+ Aggiungi Asset
</button>
</div>

</div>

<div class="grid">

<div class="card">
<h2>Valore Totale</h2>

<div class="total-balance" id="totalBalance">
€0
</div>
</div>

<div class="card">
<h2 style="margin-bottom:20px;">I Tuoi Asset</h2>

<div class="asset-list" id="assetList">
</div>
</div>

</div>

</div>

<div class="asset-modal" id="assetModal">

<div class="asset-box">

<div class="asset-header">
<h2>Aggiungi Asset</h2>

<button class="close-btn" onclick="closeAssetMenu()">
✕
</button>
</div>

<div class="crypto-grid">

<div class="crypto-item" onclick="addAsset('BTC')">
<h3>Bitcoin</h3>
<p>BTC</p>
</div>

<div class="crypto-item" onclick="addAsset('ETH')">
<h3>Ethereum</h3>
<p>ETH</p>
</div>

<div class="crypto-item" onclick="addAsset('SOL')">
<h3>Solana</h3>
<p>SOL</p>
</div>

<div class="crypto-item" onclick="addAsset('XRP')">
<h3>XRP</h3>
<p>Ripple</p>
</div>

<div class="crypto-item" onclick="addAsset('ADA')">
<h3>Cardano</h3>
<p>ADA</p>
</div>

<div class="crypto-item" onclick="addAsset('DOGE')">
<h3>Dogecoin</h3>
<p>DOGE</p>
</div>

</div>
</div>
</div>

<script>

const supabaseUrl = 'INSERISCI_URL_SUPABASE';
const supabaseKey = 'INSERISCI_ANON_KEY';

const supabaseClient = supabase.createClient(
    supabaseUrl,
    supabaseKey
);

function openAssetMenu(){
    document.getElementById('assetModal').classList.add('active');
}

function closeAssetMenu(){
    document.getElementById('assetModal').classList.remove('active');
}

window.addEventListener('click', function(e){

    const modal = document.getElementById('assetModal');

    if(e.target === modal){
        closeAssetMenu();
    }

});

async function addAsset(symbol){

    const amount = prompt(`Quantità ${symbol}`);
    if(!amount) return;

    const buyPrice = prompt(`Prezzo acquisto ${symbol}`);
    if(!buyPrice) return;

    const walletAddress = prompt(`Wallet address ${symbol}`);

    const {
        data: { user }
    } = await supabaseClient.auth.getUser();

    if(!user){
        alert('Devi fare il login');
        return;
    }

    const { error } = await supabaseClient
        .from('portfolio')
        .insert([
            {
                user_id:user.id,
                symbol:symbol,
                amount:parseFloat(amount),
                buy_price:parseFloat(buyPrice),
                wallet_address:walletAddress
            }
        ]);

    if(error){
        console.error(error);
        alert('Errore salvataggio asset');
        return;
    }

    closeAssetMenu();

    await loadPortfolio();
}

async function loadPortfolio(){

    const assetList = document.getElementById('assetList');

    assetList.innerHTML = '';

    const {
        data: { user }
    } = await supabaseClient.auth.getUser();

    if(!user){
        assetList.innerHTML = '<p>Login richiesto</p>';
        return;
    }

    const { data, error } = await supabaseClient
        .from('portfolio')
        .select('*')
        .eq('user_id', user.id)
        .order('created_at', { ascending:false });

    if(error){
        console.error(error);
        return;
    }

    let total = 0;

    data.forEach(asset => {

        const value = asset.amount * asset.buy_price;

        total += value;

        const div = document.createElement('div');

        div.className = 'asset';

        div.innerHTML = `
        <div class="asset-left">

            <div class="coin">
                ${asset.symbol[0]}
            </div>

            <div class="asset-info">
                <h3>${asset.symbol}</h3>
                <p>${asset.amount} ${asset.symbol}</p>
                <p>Wallet: ${asset.wallet_address || 'Non inserito'}</p>
            </div>

        </div>

        <div>
            <h3>€${value.toLocaleString()}</h3>
        </div>
        `;

        assetList.appendChild(div);

    });

    document.getElementById('totalBalance').innerHTML =
        `€${total.toLocaleString()}`;
}

window.onload = async () => {
    await loadPortfolio();
}

</script>

</body>
</html>
```
