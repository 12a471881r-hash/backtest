<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>CryptoEdge — CoinGecko Safe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f1117; --card: #171923; --accent: #f7931a; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 50px; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #2b3245; display: inline-block; width: 100%; max-width: 450px; }
        input { padding: 14px; border-radius: 10px; border: 1px solid #2b3245; background: #0a0c10; color: white; width: 80%; margin-bottom: 15px; outline: none; }
        input:focus { border-color: var(--accent); }
        button { padding: 14px 25px; border-radius: 10px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; width: 80%; }
        #result { margin-top: 25px; min-height: 50px; }
        .valore-euro { font-size: 32px; font-weight: 800; color: #16c784; margin-top: 10px; }
        .error { color: #ea3943; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h1 style="margin-bottom: 10px;">ETH Tracker</h1>
        <p style="color: #b8bfd3; margin-bottom: 25px;">Prezzi live da CoinGecko</p>
        
        <input type="text" id="address" placeholder="Incolla indirizzo 0x...">
        <button onclick="getLiveValue()">Calcola Valore</button>
        
        <div id="result"></div>
    </div>

<script>
async function getLiveValue() {
    const addr = document.getElementById('address').value.trim();
    const resDiv = document.getElementById('result');
    
    // Reset e validazione
    resDiv.innerHTML = "Caricamento...";
    if (!addr.startsWith('0x') || addr.length < 42) {
        resDiv.innerHTML = "<span class='error'>Indirizzo non valido</span>";
        return;
    }

    try {
        // 1. RECUPERO BILANCIO (Blockchain)
        const ethRes = await fetch('https://cloudflare-eth.com', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                jsonrpc: "2.0",
                method: "eth_getBalance",
                params: [addr, "latest"],
                id: 1
            })
        });
        const ethData = await ethRes.json();
        
        if (!ethData.result) throw new Error("Bilancio non trovato");

        const balanceEth = parseInt(ethData.result, 16) / 10**18;

        // 2. RECUPERO PREZZO (CoinGecko)
        // Usiamo un piccolo trucco per evitare il blocco: aggiungiamo un timestamp casuale
        const priceRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=eur&t=' + Date.now());
        const priceData = await priceRes.json();
        
        const priceEur = priceData?.ethereum?.eur || 0;

        // 3. CALCOLO ANTI-NaN
        if (priceEur === 0) {
            resDiv.innerHTML = `
                <div style="color:#b8bfd3;">Bilancio: ${balanceEth.toFixed(4)} ETH</div>
                <div class="error">Prezzo CoinGecko momentaneamente non disponibile</div>
            `;
            return;
        }

        const totalValue = balanceEth * priceEur;

        resDiv.innerHTML = `
            <div style="color:#b8bfd3; font-size:14px;">${balanceEth.toFixed(6)} ETH</div>
            <div class="valore-euro">€${totalValue.toLocaleString('it-IT', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
            <div style="font-size:11px; color:#555; margin-top:5px;">1 ETH = €${priceEur}</div>
        `;

    } catch (err) {
        console.error(err);
        resDiv.innerHTML = "<span class='error'>Errore di connessione. Riprova tra un istante.</span>";
    }
}
</script>
</body>
</html>
