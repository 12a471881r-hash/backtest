<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora 2.0 — Premium Wallet Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
:root {
  --bg: #050508;
  --bg-card: rgba(17, 17, 24, 0.7);
  --border: rgba(255, 255, 255, 0.08);
  --accent: #00ffa3;
  --accent-glow: rgba(0, 255, 163, 0.3);
  --text: #ffffff;
  --text-dim: #94a3b8;
  --glass: blur(12px) saturate(160%);
  --r-xl: 24px;
  --r-lg: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Inter', sans-serif; 
  background: var(--bg); 
  color: var(--text); 
  overflow: hidden;
  background-image: radial-gradient(circle at 50% -20%, #1a2c24 0%, transparent 50%);
}

.app { display: grid; grid-template-columns: 80px 1fr; height: 100vh; }

/* --- SIDEBAR PREMIUM --- */
.leftnav {
  background: rgba(10, 10, 15, 0.8);
  backdrop-filter: var(--glass);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 20px;
}
.nav-logo {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), #00d4ff);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; color: #000; box-shadow: 0 0 20px var(--accent-glow);
  text-decoration: none; margin-bottom: 20px;
}
.nav-btn {
  width: 48px; height: 48px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); transition: all 0.3s; cursor: pointer;
}
.nav-btn:hover { background: var(--border); color: var(--accent); }
.nav-btn.active { background: rgba(0, 255, 163, 0.1); color: var(--accent); border: 1px solid rgba(0, 255, 163, 0.2); }

/* --- MAIN CONTENT --- */
.main { overflow-y: auto; padding: 40px; position: relative; }

/* --- SEARCH HERO --- */
.search-hero {
  background: var(--bg-card);
  backdrop-filter: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 40px; margin-bottom: 30px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.hero-title { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
.hero-sub { color: var(--text-dim); margin-bottom: 24px; }

.search-container {
  display: flex; gap: 12px; background: rgba(255,255,255,0.03);
  padding: 8px; border-radius: 18px; border: 1px solid var(--border);
}
.hero-input {
  flex: 1; background: transparent; border: none; outline: none;
  color: #fff; padding: 0 16px; font-family: inherit; font-size: 15px;
}
.hero-btn {
  background: var(--accent); color: #000; border: none;
  padding: 12px 24px; border-radius: 12px; font-weight: 700;
  cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px var(--accent-glow);
}
.hero-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

/* --- CHAIN PILLS --- */
.chain-pills { display: flex; gap: 10px; margin-top: 20px; }
.cpill {
  padding: 8px 16px; border-radius: 10px; background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); cursor: pointer; font-size: 12px; font-weight: 600;
  transition: 0.2s; color: var(--text-dim); display: flex; align-items: center; gap: 8px;
}
.cpill:hover { border-color: var(--accent); color: #fff; }
.cpill.active { background: var(--accent); color: #000; border-color: var(--accent); }

/* --- RESULTS AREA --- */
.card {
  background: var(--bg-card); backdrop-filter: var(--glass);
  border: 1px solid var(--border); border-radius: var(--r-lg);
  padding: 24px; transition: 0.3s;
}
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
.kpi-val { font-size: 24px; font-weight: 800; margin: 8px 0; }
.kpi-label { font-size: 11px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }

/* Loading States */
.loading-wrap { display: none; text-align: center; padding: 40px; }
.spinner { 
  width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); 
  border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>
<body>

<div class="app">
  <div class="leftnav">
    <a href="#" class="nav-logo">N</a>
    <div class="nav-btn active" title="Analisi Wallet"><i class="ti ti-search"></i></div>
    <div class="nav-btn" title="Il mio Portfolio"><i class="ti ti-briefcase"></i></div>
    <div class="nav-btn" title="Impostazioni"><i class="ti ti-settings"></i></div>
  </div>

  <div class="main">
    <div class="search-hero">
      <div class="hero-title">Esplora la Blockchain</div>
      <div class="hero-sub">Analizza istantaneamente asset, transazioni e DeFi su più chain.</div>
      
      <div class="search-container">
        <input type="text" id="wallet-addr" class="hero-input" placeholder="Inserisci indirizzo ETH, SOL o BTC...">
        <button id="search-btn" class="hero-btn" onclick="scanWallet()">Analizza ora</button>
      </div>

      <div class="chain-pills" id="chain-selector">
        <div class="cpill active" onclick="selectChain('eth', this)"><i class="ti ti-currency-ethereum"></i> Ethereum</div>
        <div class="cpill" onclick="selectChain('solana', this)"><i class="ti ti-sun"></i> Solana</div>
        <div class="cpill" onclick="selectChain('btc', this)"><i class="ti ti-currency-bitcoin"></i> Bitcoin</div>
      </div>
    </div>

    <div id="loading-wrap" class="loading-wrap">
      <div class="spinner"></div>
      <p id="loading-msg">Sincronizzazione dati...</p>
    </div>

    <div id="results" style="display:none;">
      <div class="kpi-grid" id="kpi-grid">
        </div>
      <div class="card" id="main-card">
        </div>
    </div>
  </div>
</div>

<script>
let currentChain = 'eth';

// Mantieni la configurazione esistente per le chain EVM e aggiungi SOL/BTC
const CONFIG = {
  CHAINS: {
    eth: { name: 'Ethereum', sym: 'ETH', color: '#627EEA' },
    solana: { name: 'Solana', sym: 'SOL', color: '#14F195' },
    btc: { name: 'Bitcoin', sym: 'BTC', color: '#F7931A' }
  }
};

function selectChain(chain, el) {
  currentChain = chain;
  document.querySelectorAll('.cpill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('wallet-addr').placeholder = `Inserisci indirizzo ${CONFIG.CHAINS[chain].name}...`;
}

async function scanWallet() {
  const addr = document.getElementById('wallet-addr').value.trim();
  if(!addr) return;

  document.getElementById('results').style.display = 'none';
  document.getElementById('loading-wrap').style.display = 'block';
  document.getElementById('loading-msg').textContent = `Scansione ${CONFIG.CHAINS[currentChain].name} in corso...`;

  try {
    let data;
    if (currentChain === 'eth') {
      data = await scanEthereum(addr); // Qui chiami la tua funzione originale
    } else if (currentChain === 'solana') {
      data = await scanSolana(addr);
    } else if (currentChain === 'btc') {
      data = await scanBitcoin(addr);
    }
    
    renderResults(data);
  } catch (err) {
    alert("Errore durante la scansione: " + err.message);
  } finally {
    document.getElementById('loading-wrap').style.display = 'none';
  }
}

async function scanSolana(addr) {
  // Utilizzo RPC pubblico Solana per il saldo
  const response = await fetch('https://api.mainnet-beta.solana.com', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      jsonrpc: "2.0", id: 1,
      method: "getBalance", params: [addr]
    })
  });
  const json = await response.json();
  const balance = (json.result.value / 1e9).toFixed(4);
  return { balance, sym: 'SOL', type: 'Solana Network' };
}

async function scanBitcoin(addr) {
  // Utilizzo API Blockchain.info per BTC
  const response = await fetch(`https://blockchain.info/rawaddr/${addr}`);
  if(!response.ok) throw new Error("Indirizzo BTC non valido");
  const json = await response.json();
  const balance = (json.final_balance / 1e8).toFixed(8);
  return { balance, sym: 'BTC', type: 'Bitcoin Mainnet', txCount: json.n_tx };
}

// Integrazione della tua funzione originale ETH (esempio semplificato per la demo)
async function scanEthereum(addr) {
  // Qui inserisci la logica che hai già nel tuo file originale (Etherscan API, etc.)
  // Esempio di ritorno dati:
  return { balance: "0.00", sym: 'ETH', type: 'Ethereum Network' };
}

function renderResults(data) {
  const results = document.getElementById('results');
  const kpi = document.getElementById('kpi-grid');
  results.style.display = 'block';
  
  kpi.innerHTML = `
    <div class="card">
      <div class="kpi-label">Saldo Nativo</div>
      <div class="kpi-val">${data.balance} ${data.sym}</div>
      <div style="color:var(--accent); font-size:12px">● ${data.type}</div>
    </div>
    <div class="card">
      <div class="kpi-label">Valore Stimato</div>
      <div class="kpi-val">$ --</div>
      <div style="color:var(--text-dim); font-size:12px">Prezzo live caricato</div>
    </div>
  `;
}
</script>
</body>
</html>
