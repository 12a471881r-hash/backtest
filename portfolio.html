<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CryptoEdge AI — Live Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --card: #171923;
            --accent: #f7931a;
            --text: #ffffff;
            --text2: #b8bfd3;
            --border: #2b3245;
            --green: #16c784;
            --red: #ea3943;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 600px; }

        .header { text-align: center; margin-bottom: 40px; }

        .search-box {
            background: var(--card);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #0a0c10;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:disabled { background: #3b435b; cursor: not-allowed; }

        .total-display {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(247, 147, 26, 0.05);
            border-radius: 20px;
            border: 1px dashed var(--accent);
            display: none;
        }

        .total-amount {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent);
            display: block;
        }

        .asset-item {
            background: var(--card);
            padding: 18px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .loading { text-align: center; color: var(--accent); display: none; margin: 20px; }
        .error-msg { color: var(--red); text-align: center; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>CryptoEdge <span style="color:var(--accent)">Live</span></h1>
        <p style="color:var(--text2)">Analisi tempo reale portafoglio Ethereum</p>
    </div>

    <div class="search-box">
        <input type="text" id="walletAddr" placeholder="Incolla indirizzo 0x...">
        <button id="fetchBtn" onclick="fetchWalletData()">Analizza Portafoglio</button>
        <div id="errorBox" class="error-msg"></div>
    </div>

    <div id="loading" class="loading">Interrogazione Blockchain in corso...</div>

    <div id="totalDisplay" class="total-display">
        <span style="color:var(--text2); text-transform: uppercase; font-size: 11px; letter-spacing: 1px;">Valore Totale</span>
        <span id="totalAmount" class="total-amount">$0.00</span>
    </div>

    <div id="results"></div>
</div>

<script>
    // --- INSERISCI QUI LA TUA CHIAVE MORALIS ---
    const MORALIS_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJub25jZSI6Ijk3MmNhZjVhLTIwM2YtNDNmNy1hNTYwLWNkMTE1OWY1YzA1ZSIsIm9yZ0lkIjoiNTE3Njk1IiwidXNlcklkIjoiNTMyNzcxIiwidHlwZUlkIjoiN2JlMTQzMDUtZjAwNy00YzZhLWJkZGQtNGJlOTk0MjAwMDIyIiwidHlwZSI6IlBST0pFQ1QiLCJpYXQiOjE3Nzk4NjkyMTEsImV4cCI6NDkzNTYyOTIxMX0.U4XOdogEgRrMjlTiC6CBj7Nzo5cbJFV1-ZlIwgYF3Zg'; 

    async function fetchWalletData() {
        const address = document.getElementById('walletAddr').value.trim();
        const resultsDiv = document.getElementById('results');
        const loading = document.getElementById('loading');
        const totalDisplay = document.getElementById('totalDisplay');
        const totalAmount = document.getElementById('totalAmount');
        const errorBox = document.getElementById('errorBox');
        const btn = document.getElementById('fetchBtn');

        if(!address.startsWith('0x') || address.length < 40) {
            errorBox.innerText = "Indirizzo non valido. Assicurati che inizi con 0x";
            return;
        }

        // Reset UI
        errorBox.innerText = "";
        resultsDiv.innerHTML = "";
        totalDisplay.style.display = "none";
        loading.style.display = "block";
        btn.disabled = true;

        try {
            const response = await fetch(`https://deep-index.moralis.io/api/v2.2/${address}/erc20?chain=eth`, {
                method: 'GET',
                headers: {
                    'accept': 'application/json',
                    'X-API-Key': MORALIS_KEY
                }
            });

            if (!response.ok) throw new Error("Chiave API non valida o errore di rete");

            const tokens = await response.json();
            loading.style.display = 'none';

            if (!tokens || tokens.length === 0) {
                errorBox.innerText = "Nessun asset trovato su questo indirizzo.";
                return;
            }

            // Inizializziamo il totale a zero (evita NaN)
            let grandTotal = 0;

            tokens.forEach(token => {
                // LOGICA ANTI-NaN: parseFloat e fallback a 0
                const balance = parseFloat(token.balance_formatted) || 0;
                const price = parseFloat(token.usd_price) || 0;
                const usdValue = balance * price;

                if (balance > 0) {
                    // Aggiunge al totale solo se è un numero valido
                    if (!isNaN(usdValue)) {
                        grandTotal += usdValue;
                    }

                    const card = document.createElement('div');
                    card.className = 'asset-item';
                    
                    const priceDisplay = price > 0 
                        ? `$${price.toLocaleString(undefined, {minimumFractionDigits: 2})}` 
                        : "N/D";
                    
                    const valueDisplay = usdValue > 0 
                        ? `$${usdValue.toLocaleString(undefined, {minimumFractionDigits: 2})}` 
                        : "--";

                    card.innerHTML = `
                        <div>
                            <div style="font-weight:700; font-size: 17px;">${token.symbol || 'Token'}</div>
                            <div style="color:var(--text2); font-size: 12px;">${balance.toFixed(4)} unità</div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-weight:700; font-size: 17px;">${valueDisplay}</div>
                            <div style="color:var(--green); font-size: 12px;">${priceDisplay}</div>
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                }
            });

            // Visualizzazione Totale Finale
            totalDisplay.style.display = "block";
            totalAmount.innerText = `$${grandTotal.toLocaleString(undefined, {
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2
            })}`;

        } catch (err) {
            loading.style.display = 'none';
            errorBox.innerText = "Errore: " + err.message;
            console.error("Dettaglio Errore:", err);
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
