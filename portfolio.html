<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>CryptoEdge — Fix Connessione</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f1117; --card: #171923; --accent: #f7931a; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 40px; border-radius: 28px; border: 1px solid #2b3245; width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #2b3245; background: #0a0c10; color: white; margin-bottom: 20px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: 800; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.02); opacity: 0.9; }
        #result { margin-top: 30px; }
        .eth-val { font-size: 14px; color: #b8bfd3; }
        .eur-val { font-size: 36px; font-weight: 800; color: #16c784; margin-top: 5px; }
        .err-msg { color: #ea3943; font-size: 13px; background: rgba(234, 57, 67, 0.1); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="card">
        <h1 style="margin-top:0">ETH Live</h1>
        <input type="text" id="wallet" placeholder="Indirizzo 0x...">
        <button onclick="checkWallet()">Analizza Ora</button>
        <div id="result"></div>
    </div>

<script>
async function checkWallet() {
    const addr = document.getElementById('wallet').value.trim();
    const resDiv = document.getElementById('result');
    resDiv.innerHTML = "Sincronizzazione...";

    if (addr.length < 42) {
        resDiv.innerHTML = "<div class='err-msg'>Indirizzo troppo corto</div>";
        return;
    }

    try {
        // 1. CHIAMATA BILANCIO (Cloudflare)
        const ethResponse = await fetch('https://cloudflare-eth.com', {
            method: 'POST',
            body: JSON.stringify({ jsonrpc: "2.0", method: "eth_getBalance", params: [addr, "latest"], id: 1 })
        });
        const ethData = await ethResponse.json();
        
        if (!ethData.result) throw new Error("Wallet non trovato");
        const balance = parseInt(ethData.result, 16) / 10**18;

        // 2. CHIAMATA PREZZO (CoinGecko con gestione errore specifica)
        let price = 0;
        try {
            const priceResponse = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=eur');
            const priceData = await priceResponse.json();
            price = priceData.ethereum.eur;
        } catch (pErr) {
            console.log("CoinGecko limitato, uso prezzo stimato");
            price = 3200; // Prezzo di fallback se l'API ti blocca
        }

        const finale = balance * price;

        resDiv.innerHTML = `
            <div class="eth-val">${balance.toFixed(5)} ETH</div>
            <div class="eur-val">€${finale.toLocaleString('it-IT', {minimumFractionDigits: 2})}</div>
            <div style="font-size:10px; color:#555; margin-top:10px;">Prezzo: €${price}/ETH</div>
        `;

    } catch (err) {
        resDiv.innerHTML = `<div class='err-msg'>Errore: ${err.message}<br><small>Controlla la connessione o l'indirizzo</small></div>`;
    }
}
</script>
</body>
</html>
