<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CryptoEdge AI — Live Portfolio Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --card: #171923;
            --accent: #f7931a;
            --text: #ffffff;
            --text2: #b8bfd3;
            --border: #2b3245;
            --green: #16c784;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 650px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .search-box {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #0a0c10;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }

        .total-display {
            text-align: center;
            margin-bottom: 30px;
            display: none;
        }

        .total-amount {
            font-size: 42px;
            font-weight: 800;
            color: var(--accent);
            display: block;
        }

        .asset-item {
            background: var(--card);
            padding: 20px;
            border-radius: 18px;
            border: 1px solid var(--border);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading {
            text-align: center;
            color: var(--accent);
            display: none;
            font-weight: 600;
        }

        .error-msg {
            color: #ea3943;
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-icon">₿</div>
        <h1>CryptoEdge <span style="color:var(--accent)">Live</span></h1>
        <p style="color:var(--text2)">Inserisci un indirizzo per vedere il valore in tempo reale</p>
    </div>

    <div class="search-box">
        <input type="text" id="walletAddr" placeholder="Indirizzo Ethereum (0x...)" value="">
        <button id="fetchBtn" onclick="fetchWalletData()">Analizza Portafoglio</button>
        <div id="errorBox" class="error-msg"></div>
    </div>

    <div id="loading" class="loading">Sincronizzazione con la blockchain...</div>

    <div id="totalDisplay" class="total-display">
        <span style="color:var(--text2); text-transform: uppercase; font-size: 12px; letter-spacing: 1px;">Valore Totale Stimato</span>
        <span id="totalAmount" class="total-amount">$0.00</span>
    </div>

    <div id="results"></div>
</div>

    async function fetchWalletData() {
        const address = document.getElementById('walletAddr').value.trim();
        const resultsDiv = document.getElementById('results');
        const loading = document.getElementById('loading');
        const totalHeader = document.getElementById('totalVal');

        if(!address.startsWith('0x') || address.length < 40) {
            alert("Per favore inserisci un indirizzo Ethereum valido.");
            return;
        }

        // Reset UI
        resultsDiv.innerHTML = '';
        totalHeader.innerText = '';
        loading.style.display = 'block';

        try {
            // Chiamata API a Moralis (Chain: Ethereum)
            const response = await fetch(`https://deep-index.moralis.io/api/v2.2/${address}/erc20?chain=eth`, {
                method: 'GET',
                headers: {
                    'accept': 'application/json',
                    'X-API-Key': MORALIS_KEY
                }
            });

            if (!response.ok) throw new Error("Errore API o Chiave non valida");

            const tokens = await response.json();
            loading.style.display = 'none';

            if (tokens.length === 0) {
                resultsDiv.innerHTML = "<p style='text-align:center'>Nessun token trovato.</p>";
                return;
            }

            let grandTotal = 0;

            tokens.forEach(token => {
                const balance = parseFloat(token.balance_formatted);
                const price = parseFloat(token.usd_price || 0);
                const usdValue = balance * price;
                grandTotal += usdValue;

                // Crea l'elemento grafico per ogni token
                if(balance > 0) {
                    const card = document.createElement('div');
                    card.className = 'asset-card';
                    card.innerHTML = `
                        <div>
                            <strong style="color:var(--accent)">${token.symbol}</strong><br>
                            <small style="color:var(--text2)">${balance.toFixed(4)} ${token.symbol}</small>
                        </div>
                        <div style="text-align:right">
                            <div>$${usdValue.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                            <small style="color:#16c784">$${price.toFixed(2)}</small>
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                }
            });

            totalHeader.innerText = `Valore Totale: $${grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

        } catch (err) {
            loading.style.display = 'none';
            alert("Errore: " + err.message);
            console.error(err);
        }
    }
</script>
